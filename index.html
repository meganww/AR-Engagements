<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Apollo Tool - PHX6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#F5F3FF;font-size:13px}
.H{background:linear-gradient(135deg,#4C1D95,#6D28D9);padding:12px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}.H h1{font-size:17px}
.T{display:flex;background:#fff;border-bottom:2px solid #E5E0F0;overflow-x:auto}.T button{padding:10px 14px;border:0;background:0;color:#666;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}.T button.on{color:#6D28D9;border-color:#6D28D9;background:#F5F3FF}.T button:hover{background:#F5F3FF}
.P{display:none;padding:16px;max-width:1400px;margin:auto}.P.on{display:block}
.S{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;border:1px solid #E5E0F0}
.LB{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.LB a{padding:7px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;border:1px solid #6D28D9;color:#6D28D9;background:#F5F3FF}.LB a:hover{background:#6D28D9;color:#fff}
.DZ{border:2px dashed #C4B5FD;border-radius:10px;padding:20px;text-align:center;cursor:pointer;position:relative;background:#FAFAFE;transition:.3s}.DZ:hover{border-color:#7C3AED;background:#F5F3FF}.DZ.ok{border-color:#16A34A;border-style:solid;background:#F0FDF4}.DZ input{position:absolute;inset:0;opacity:0;cursor:pointer}.DZ b{display:block;margin-bottom:4px;font-size:13px}.DZ small{color:#888}
.DG{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.Q{max-height:500px;overflow-y:auto;margin-top:10px}
.card{background:#FAFAFE;border:1px solid #E5E0F0;border-radius:8px;margin-bottom:6px;overflow:hidden}.card:hover{border-color:#C4B5FD}
.ch{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer}.ch .nm{font-weight:700;font-size:12px}.ch .mg{font-size:10px;color:#888}.ch .st{display:flex;gap:10px;font-size:12px}.ch .pv{font-weight:700}

.btn2{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;border:0;padding:8px 14px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;margin-top:8px}
.gen{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;border:0;padding:10px 18px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;margin-top:10px}
.out{background:#F9FAFB;border:1px solid #D1D5DB;border-radius:6px;padding:12px;margin-top:10px;white-space:pre-wrap;line-height:1.7;position:relative;font-size:12px}
.cpb{position:absolute;top:6px;right:6px;background:#7C3AED;color:#fff;border:0;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer}
label.fl{font-size:11px;font-weight:600;color:#666;display:block;margin-bottom:2px;margin-top:8px}
input.f,textarea.f,select.f{width:100%;padding:7px;border:1px solid #D1D5DB;border-radius:5px;font-size:12px;font-family:inherit;margin-bottom:4px}input.f:focus,textarea.f:focus{outline:0;border-color:#7C3AED}textarea.f{min-height:50px;resize:vertical}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.clr{background:#E5E0F0;color:#4C1D95;border:0;padding:5px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}.clr:hover{background:#DC2626;color:#fff}
.fbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end}
.fbar input,.fbar select{padding:6px 8px;font-size:12px;border:1px solid #D1D5DB;border-radius:4px}
/* Tracker */
.TT{width:100%;border-collapse:collapse;font-size:11px;min-width:700px}.TT th{background:#4C1D95;color:#fff;padding:6px;font-size:10px;text-align:center;position:sticky;top:0}.TT td{padding:5px;border-bottom:1px solid #E5E0F0;text-align:center}.TT tr:hover td{background:#EDE9FE}.TT .tl{text-align:left;font-weight:700}.TT .na{color:#aaa}
.TT input[type=checkbox]{accent-color:#7C3AED}
.GC{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}.GC div{background:#fff;border:1px solid #E5E0F0;border-radius:8px;padding:10px;text-align:center}.GC b{font-size:20px;color:#7C3AED;display:block}.GC small{font-size:9px;color:#888;text-transform:uppercase}
/* History */
.HC{background:#FAFAFE;border:1px solid #E5E0F0;border-radius:8px;padding:12px;margin-bottom:8px}.HC:hover{border-color:#C4B5FD}

.HSG{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}.HSG div{background:#fff;border:1px solid #E5E0F0;border-radius:8px;padding:8px;text-align:center}.HSG b{font-size:18px;color:#7C3AED;display:block}.HSG small{font-size:9px;color:#888;text-transform:uppercase}
</style></head><body>
<div class="H"><h1>Apollo Engagement Tool <span style="background:#fff;color:#4C1D95;padding:2px 8px;border-radius:8px;font-size:10px">PHX6</span></h1><small style="color:#DDD6FE">5 Power + 5 Cleaning / shift</small></div>
<div class="T" id="tabs"></div>
<div id="panels"></div>
<script>
var TABS=[{id:'power',n:'Power Testing'},{id:'clean',n:'Cleaning'},{id:'refurb',n:'Refurb'},{id:'yield',n:'AR-Yield'},{id:'concessions',n:'Concessions'},{id:'combined',n:'Combined Tracker'},{id:'history',n:'History'}];
var LK={power:{q:'https://us-east-1.quicksight.aws.amazon.com/sn/account/quetzal/dashboards/0560e9bc-d466-490c-8fc1-af1576881b89/sheets/0560e9bc-d466-490c-8fc1-af1576881b89_d468adaa-e6ca-44e9-9fb7-7ec0a6fc2f2a',a:'https://apollo-audit.corp.amazon.com/audits/new?audit_type_id=23088'},clean:{q:'https://us-east-1.quicksight.aws.amazon.com/sn/account/quetzal/dashboards/ca6a68c5-8e72-4dbb-a1f6-ec7eda7a39f3',a:'https://apollo-audit.corp.amazon.com/audits/new?audit_type_id=19802'},refurb:{q:'https://us-east-1.quicksight.aws.amazon.com/sn/account/quetzal/dashboards/fb2bee57-7859-4204-b5c1-1ba232027b30'},yield:{q:'https://us-east-1.quicksight.aws.amazon.com/sn/account/quetzal/dashboards/50b1ccb2-0aca-4cbc-9319-4fc6936bac78/sheets/50b1ccb2-0aca-4cbc-9319-4fc6936bac78_22c69195-ad99-48f6-a7fa-17c285702e0e'},concessions:{q:'https://us-east-1.quicksight.aws.amazon.com/sn/account/quetzal/dashboards/50b1ccb2-0aca-4cbc-9319-4fc6936bac78/sheets/50b1ccb2-0aca-4cbc-9319-4fc6936bac78_118b4970-6f43-4f04-8619-3b6bb3bde020'}};
var GR='https://eu-cretfc-tools-dub.dub.proxy.amazon.com/gravis/';
var D={};['power','clean','refurb','yield','concessions'].forEach(function(t){D[t]={top:[],line:[],m:[]};});
var HK='apo_h4',CK='apo_c4';
function gH(){try{return JSON.parse(localStorage.getItem(HK))||[];}catch(e){return[];}}
function sH(h){localStorage.setItem(HK,JSON.stringify(h));}
function gC(){try{return JSON.parse(localStorage.getItem(CK))||{};}catch(e){return{};}}
function sC(c){localStorage.setItem(CK,JSON.stringify(c));}

// TABS
document.getElementById('tabs').innerHTML=TABS.map(function(t,i){return '<button '+(i===0?'class="on"':'')+' onclick="sw(\''+t.id+'\')">'+t.n+'</button>';}).join('');
function sw(id){document.querySelectorAll('.T button').forEach(function(b){b.classList.toggle('on',b.textContent===TABS.find(function(t){return t.id===id}).n)});document.querySelectorAll('.P').forEach(function(p){p.classList.toggle('on',p.id==='p-'+id)});if(id==='combined')rC();if(id==='history')rH();}

// CSV
function pc(t){var l=t.split('\n');if(l.length<2)return[];var h=pl(l[0]);var r=[];for(var i=1;i<l.length;i++){var ln=l[i].trim();if(!ln)continue;var v=pl(ln);var o={};for(var j=0;j<h.length;j++)o[h[j].trim()]=(v[j]||'').trim();r.push(o);}return r;}
function pl(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(q){if(ch==='"'){if(i+1<l.length&&l[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}else{if(ch==='"')q=true;else if(ch===','){r.push(c);c='';}else c+=ch;}}r.push(c);return r;}

// Build panels
var ph='';
// Power & Clean
['power','clean'].forEach(function(type){
var L=LK[type];var isP=type==='power';var nm=isP?'Power Testing':'Cleaning';
ph+='<div class="P'+(type==='power'?' on':'')+'" id="p-'+type+'"><div class="LB"><a href="'+L.q+'" target="_blank">QuickSight - '+nm+'</a>';
if(L.a)ph+='<a href="'+L.a+'" target="_blank">Apollo - '+nm+'</a>';
ph+='<a href="'+GR+'" target="_blank">Gravis</a></div>';
ph+='<div class="S"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>Drop CSV Files</b><button class="clr" onclick="clr(\''+type+'\')">Clear</button></div>';
ph+='<div class="DG"><div class="DZ" id="'+type+'-d1" ondragover="event.preventDefault();this.style.borderColor=\'#7C3AED\'" ondragleave="this.style.borderColor=\'\'" ondrop="event.preventDefault();this.style.borderColor=\'\';pf(event.dataTransfer.files[0],\''+type+'\',\'top\')"><input type="file" accept=".csv" onchange="pf(this.files[0],\''+type+'\',\'top\')"><b>Top Opportunities</b><small>Drop CSV</small><div id="'+type+'-d1s"></div></div>';
ph+='<div class="DZ" id="'+type+'-d2" ondragover="event.preventDefault();this.style.borderColor=\'#7C3AED\'" ondragleave="this.style.borderColor=\'\'" ondrop="event.preventDefault();this.style.borderColor=\'\';pf(event.dataTransfer.files[0],\''+type+'\',\'line\')"><input type="file" accept=".csv" onchange="pf(this.files[0],\''+type+'\',\'line\')"><b>Line Item Drill Down</b><small>Drop CSV</small><div id="'+type+'-d2s"></div></div></div></div>';
ph+='<div class="S"><b>Engagement Queue</b><div class="fbar" id="'+type+'-fb" style="display:none;margin-top:8px"><input id="'+type+'-sr" placeholder="Search login..." oninput="fq(\''+type+'\')"><select id="'+type+'-mf" onchange="fq(\''+type+'\')"><option value="all">All Managers</option></select></div><div class="Q" id="'+type+'-q"><div class="qe" style="text-align:center;padding:20px;color:#aaa">Drop CSVs above</div></div></div>';
ph+='<div class="S"><b>Generate Engagement Note</b><div style="margin-top:10px"><div class="fg"><div><label class="fl">Associate Login</label><input class="f" id="'+type+'-login"></div><div><label class="fl">'+nm+' %</label><input class="f" id="'+type+'-pct" type="number" step="0.01"></div>';
if(isP)ph+='<div><label class="fl">Units</label><input class="f" id="pwr-u" type="number"></div><div><label class="fl">COGS ($)</label><input class="f" id="pwr-c" type="number" step="0.01"></div>';
ph+='</div><div id="'+type+'-lpn"></div>';
ph+='<label class="fl">AA Feedback</label><textarea class="f" id="'+type+'-fb2" placeholder="Why did they select Unable to Perform/Clean?"></textarea>';
ph+='<label class="fl">Coaching Provided</label><textarea class="f" id="'+type+'-co" placeholder="What coaching was given?"></textarea>';
ph+='<label class="fl">Station Supplies</label><textarea class="f" id="'+type+'-ss" placeholder="Station findings?"></textarea>';
ph+='<label class="fl">AA Buy-In</label><textarea class="f" id="'+type+'-bi" placeholder="Did associate acknowledge?"></textarea>';
ph+='<button class="gen" onclick="gen(\''+type+'\')">Generate Engagement Note</button>';
ph+='<div id="'+type+'-out" style="display:none"></div>';
ph+='<div id="'+type+'-ab" style="display:none;margin-top:8px"><button class="btn2" onclick="cpAp(\''+type+'\')">Copy Note and Open Apollo</button></div>';
ph+='</div></div></div>';
});

// Refurb, Yield, Concessions
[{id:'refurb',n:'Refurb',d:true,d1:'Primary Associates - Worst Outcomes',d2:'LPN Drill Down'},
{id:'yield',n:'AR-Yield',d:false,d1:'Yield Performance - Weekly'},
{id:'concessions',n:'Concessions',d:false,d1:'Concession Performance - Weekly'}].forEach(function(tab){
ph+='<div class="P" id="p-'+tab.id+'"><div class="LB"><a href="'+LK[tab.id].q+'" target="_blank">QuickSight - '+tab.n+'</a><a href="'+GR+'" target="_blank">Gravis</a></div>';
ph+='<div class="S"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>Drop CSV Files</b><button class="clr" onclick="clr(\''+tab.id+'\')">Clear</button></div>';
if(tab.d){ph+='<div class="DG"><div class="DZ" id="'+tab.id+'-d1" ondragover="event.preventDefault()" ondrop="event.preventDefault();pf(event.dataTransfer.files[0],\''+tab.id+'\',\'top\')"><input type="file" accept=".csv" onchange="pf(this.files[0],\''+tab.id+'\',\'top\')"><b>'+tab.d1+'</b><small>Drop CSV</small><div id="'+tab.id+'-d1s"></div></div>';
ph+='<div class="DZ" id="'+tab.id+'-d2" ondragover="event.preventDefault()" ondrop="event.preventDefault();pf(event.dataTransfer.files[0],\''+tab.id+'\',\'line\')"><input type="file" accept=".csv" onchange="pf(this.files[0],\''+tab.id+'\',\'line\')"><b>'+tab.d2+'</b><small>Drop CSV</small><div id="'+tab.id+'-d2s"></div></div></div>';}
else{ph+='<div style="max-width:400px"><div class="DZ" id="'+tab.id+'-d1" ondragover="event.preventDefault()" ondrop="event.preventDefault();pf(event.dataTransfer.files[0],\''+tab.id+'\',\'top\')"><input type="file" accept=".csv" onchange="pf(this.files[0],\''+tab.id+'\',\'top\')"><b>'+tab.d1+'</b><small>Drop CSV</small><div id="'+tab.id+'-d1s"></div></div></div>';}
ph+='</div><div class="S"><b>Queue (Lowest to Highest)</b><div class="fbar" id="'+tab.id+'-fb" style="display:none;margin-top:8px"><input id="'+tab.id+'-sr" placeholder="Search..." oninput="fq(\''+tab.id+'\')"><select id="'+tab.id+'-mf" onchange="fq(\''+tab.id+'\')"><option value="all">All</option></select></div><div class="Q" id="'+tab.id+'-q"><div style="text-align:center;padding:20px;color:#aaa">Drop CSV above</div></div></div></div>';
});

// Combined
ph+='<div class="P" id="p-combined"><div class="S"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px"><b style="font-size:15px;color:#4C1D95">Combined Associate Tracker</b><div style="display:flex;gap:6px"><input id="cmb-sr" placeholder="Search login..." style="padding:6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px" oninput="rC()"><select id="cmb-mf" style="padding:6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px" onchange="rC()"><option value="all">All Managers</option></select><button class="clr" onclick="localStorage.removeItem(CK);rC()">Reset Checks</button></div></div><div class="GC" id="cmb-g"></div><div style="overflow-x:auto"><table class="TT"><thead><tr><th>Login</th><th>Manager</th><th style="background:#6D28D9">Cleaning %</th><th style="background:#6D28D9">Power %</th><th style="background:#6D28D9">Refurb</th><th style="background:#7C3AED">Spoken To</th><th style="background:#7C3AED">Cleaning</th><th style="background:#7C3AED">Power</th><th style="background:#7C3AED">Refurb</th></tr></thead><tbody id="cmb-b"></tbody></table></div></div></div>';

// History
ph+='<div class="P" id="p-history"><div class="S"><div style="display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px"><b style="font-size:15px;color:#4C1D95">Engagement History</b><div style="display:flex;gap:5px"><button class="clr" style="background:#4C1D95;color:#fff" onclick="expH()">Export CSV</button><button class="clr" onclick="if(confirm(\'Clear all?\'))sH([]),rH()">Clear All</button></div></div><div class="HSG" id="h-st"></div><div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"><input id="h-sr" placeholder="Search..." style="flex:1;min-width:150px;padding:6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px" oninput="rH()"><select id="h-fl" style="padding:6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px" onchange="rH()"><option value="all">All</option><option value="power">Power</option><option value="clean">Cleaning</option></select><select id="h-so" style="padding:6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px" onchange="rH()"><option value="newest">Newest</option><option value="oldest">Oldest</option></select></div><div id="h-ls"></div></div></div>';

document.getElementById('panels').innerHTML=ph;

// FILE PROCESSING
function pf(file,type,which){if(!file)return;var r=new FileReader();r.onload=function(e){var rows=pc(e.target.result);D[type][which==='top'?'top':'line']=rows;var dz=document.getElementById(type+'-d'+(which==='top'?'1':'2'));dz.classList.add('ok');document.getElementById(type+'-d'+(which==='top'?'1':'2')+'s').innerHTML='<span style="color:#16A34A;font-size:12px;font-weight:600">Loaded: '+rows.length+' rows</span>';bld(type);};r.readAsText(file);}

// BUILD QUEUE
function bld(type){
var td=D[type].top,ld=D[type].line||[];
if(!td.length)return;
var as=[],mg={};
td.forEach(function(r){var id='',p=0,u=0,cg=0,mr='';
if(type==='power'){id=r['Associate Id']||'';p=parseFloat(r['% Tested'])||0;u=parseInt(r['Units Asked to Test'])||0;cg=parseFloat(r['COGS Not Tested'])||0;mr=r['Manager Id']||'';}
else if(type==='clean'){id=r['Associate Id']||'';p=parseFloat(r['% Cleaned'])||0;u=parseInt(r['Units Asked to Clean'])||0;cg=parseFloat(r['COGS Not Cleaned'])||0;mr=r['Manager Id']||'';}
else if(type==='refurb'){id=r['Grading Associate']||'';p=parseFloat(r['Refurb Success'])||0;u=parseInt(r['Unit Count'])||0;}
else{var ks=Object.keys(r);id=r['Associate Id']||r['Associate Login']||Object.values(r)[1]||'';ks.forEach(function(k){var kl=k.toLowerCase();if(!mr&&kl.indexOf('manager')>-1)mr=r[k];if(!p&&(kl.indexOf('yield')>-1||kl.indexOf('concess')>-1||kl.indexOf('%')>-1))p=parseFloat(r[k])||0;});}
if(!id)return;if(mr)mg[mr]=1;
as.push({id:id,mg:mr,p:p,pd:p<1?(p*100).toFixed(1):p.toFixed(1),u:u,cg:cg,lp:[]});});
as.sort(function(a,b){return a.p-b.p;});
if(ld.length){var lm={};ld.forEach(function(r){var a=r['Associate Id']||r['Grading Associate']||'';if(!a)return;if(!lm[a])lm[a]=[];lm[a].push({l:r['LPN']||'',g:r['GL Name']||'',s:r['Subcategory Desc']||'',c:r['Item Fifo Cost']||''});});
as.forEach(function(a){if(lm[a.id])a.lp=lm[a.id];});}
D[type].m=as;
var mf=document.getElementById(type+'-mf');if(mf){var cv=mf.value;mf.innerHTML='<option value="all">All Managers</option>';Object.keys(mg).sort().forEach(function(m){mf.innerHTML+='<option value="'+m+'">'+m+'</option>';});mf.value=cv||'all';}
document.getElementById(type+'-fb').style.display='flex';
var lb={power:'Tested',clean:'Cleaned',refurb:'Refurb',yield:'Yield',concessions:'Concessions'}[type];
var h='';as.forEach(function(a,i){
var cls=a.p<0.5?'lo':a.p<0.8?'md':'hi';
h+='<div class="card" data-l="'+a.id.toLowerCase()+'" data-m="'+(a.mg||'').toLowerCase()+'"><div class="ch" onclick="var b=this.nextElementSibling;b.classList.toggle(\'op\')"><div><span class="nm">'+a.id+'</span>';
if(a.mg)h+=' <span class="mg">Mgr: '+a.mg+'</span>';
h+='</div><div class="st"><span class="pv '+cls+'">'+a.pd+'% '+lb+'</span>';
if(a.u)h+='<span>'+a.u+' units</span>';
if(a.cg)h+='<span>$'+a.cg.toFixed(2)+'</span>';
if(a.lp.length)h+='<span style="color:#7C3AED">'+a.lp.length+' LPNs</span>';
h+='</div></div><div class="cd">';
if(a.lp.length){h+='<table><tr><th>Sel</th><th>LPN</th><th>GL</th><th>Subcat</th><th>Cost</th></tr>';
a.lp.forEach(function(lp){h+='<tr><td><input type="checkbox" data-t="'+type+'" data-a="'+a.id+'" data-l="'+lp.l+'" data-g="'+lp.g+'" data-s="'+lp.s+'" data-c="'+lp.c+'"></td><td style="font-family:monospace;color:#7C3AED;font-size:10px">'+lp.l+'</td><td>'+lp.g+'</td><td>'+lp.s+'</td><td>$'+(parseFloat(lp.c)||0).toFixed(2)+'</td></tr>';});h+='</table>';}
if(type==='power'||type==='clean')h+='<button class="btn" onclick="ldf(\''+type+'\','+i+')">Load into Form</button>';
h+='</div></div>';});
document.getElementById(type+'-q').innerHTML=h||'<div style="text-align:center;padding:20px;color:#aaa">No data</div>';
fq(type);rC();}

function fq(t){var sr=(document.getElementById(t+'-sr').value||'').toLowerCase();var mf=(document.getElementById(t+'-mf').value||'all').toLowerCase();document.querySelectorAll('#'+t+'-q .card').forEach(function(c){var ok=(!sr||c.dataset.l.indexOf(sr)>-1)&&(mf==='all'||c.dataset.m===mf);c.style.display=ok?'':'none';});}

function ldf(type,idx){
var a=D[type].m[idx];if(!a)return;
document.getElementById(type+'-login').value=a.id;document.getElementById(type+'-pct').value=a.pd;
if(type==='power'){document.getElementById('pwr-u').value=a.u;document.getElementById('pwr-c').value=a.cg.toFixed(2);}
var ch=document.querySelectorAll('#'+type+'-q input[type=checkbox][data-a="'+a.id+'"]:checked');
var lh='';
if(ch.length){lh='<div style="background:#F5F3FF;border:1px solid #E5E0F0;border-radius:6px;padding:8px;margin-top:8px">';
ch.forEach(function(cb){var desc=cb.dataset.g;if(cb.dataset.s)desc+=' - '+cb.dataset.s;
lh+='<div style="margin-bottom:6px"><div style="font-size:11px;color:#6D28D9;font-weight:600">'+cb.dataset.l+' ('+desc+')</div><input class="f lpnr" data-l="'+cb.dataset.l+'" data-g="'+cb.dataset.g+'" data-s="'+cb.dataset.s+'" placeholder="Reason they could not test/clean this item" style="font-size:11px"></div>';});
lh+='</div>';}
document.getElementById(type+'-lpn').innerHTML=lh;}

function gen(type){
var login=document.getElementById(type+'-login').value;var pct=document.getElementById(type+'-pct').value;
var rs=document.querySelectorAll('#'+type+'-lpn .lpnr');var lpns=[];
rs.forEach(function(i){if(i.dataset.l)lpns.push({l:i.dataset.l,g:i.dataset.g,s:i.dataset.s,r:i.value.trim()});});
var ls=lpns.map(function(l){return l.l}).join(', ');
var fb=document.getElementById(type+'-fb2').value.trim();
var co=document.getElementById(type+'-co').value.trim();
var ss=document.getElementById(type+'-ss').value.trim();
var bi=document.getElementById(type+'-bi').value.trim();
var tl=type==='power'?'power testing':'cleaning';
var n='Engagement Data: Engaged with AA '+login+' regarding '+(ls||'their '+tl+' performance')+'.';
if(type==='power')n+=' Their power testing percentage was '+pct+'%. They were asked to test '+document.getElementById('pwr-u').value+' items with $'+parseFloat(document.getElementById('pwr-c').value||0).toFixed(2)+' COGS not tested.';
else n+=' Their cleaning percentage was '+pct+'%.';
n+='\n\nAA Feedback: '+(fb||'[Fill in]');
n+='\n\nCoaching Provided: '+(co||'[Fill in]');
n+='\n\nStation Supplies: '+(ss||'[Fill in]');
n+='\n\nAA Buy-In: '+(bi||'[Fill in]');
if(lpns.length){n+='\n\nLPNs Reviewed:';lpns.forEach(function(l){var d=l.s?l.g+' - '+l.s:l.g;n+='\n'+l.l+' ('+d+') - '+(l.r||'[reason]');});}
document.getElementById(type+'-out').style.display='block';
document.getElementById(type+'-out').innerHTML='<div class="out"><button class="cpb" onclick="cpN(\''+type+'\')">Copy</button>'+esc(n.trim())+'</div>';
document.getElementById(type+'-ab').style.display='block';
sH(gH().concat([{id:Date.now(),type:type,login:login||'?',pct:pct||'?',date:new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),ts:new Date().toISOString(),note:n.trim()}]));}

function cpN(t){var el=document.querySelector('#'+t+'-out .out');navigator.clipboard.writeText(el.textContent.replace('Copy','').trim()).then(function(){var b=document.querySelector('#'+t+'-out .cpb');b.textContent='Copied!';b.style.background='#16A34A';setTimeout(function(){b.textContent='Copy';b.style.background='';},1500);});}
function cpAp(t){var el=document.querySelector('#'+t+'-out .out');navigator.clipboard.writeText(el.textContent.replace('Copy','').trim()).then(function(){window.open(LK[t].a,'_blank');});}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}

function clr(t){D[t]={top:[],line:[],m:[]};['d1','d2'].forEach(function(d){var el=document.getElementById(t+'-'+d);if(el){el.classList.remove('ok');var s=document.getElementById(t+'-'+d+'s');if(s)s.innerHTML='';var inp=el.querySelector('input');if(inp)inp.value='';}});document.getElementById(t+'-q').innerHTML='<div style="text-align:center;padding:20px;color:#aaa">Drop CSVs above</div>';if(document.getElementById(t+'-fb'))document.getElementById(t+'-fb').style.display='none';
['login','pct','fb2','co','ss','bi'].forEach(function(f){var el=document.getElementById(t+'-'+f);if(el)el.value='';});
if(t==='power')['pwr-u','pwr-c'].forEach(function(f){var el=document.getElementById(f);if(el)el.value='';});
var lp=document.getElementById(t+'-lpn');if(lp)lp.innerHTML='';var o=document.getElementById(t+'-out');if(o)o.style.display='none';var ab=document.getElementById(t+'-ab');if(ab)ab.style.display='none';rC();}

// COMBINED TRACKER
function rC(){
var sr=(document.getElementById('cmb-sr').value||'').toLowerCase();
var mf=(document.getElementById('cmb-mf').value||'all').toLowerCase();
var all={},mg={};
['power','clean','refurb'].forEach(function(t){(D[t].m||[]).forEach(function(a){
if(a.mg)mg[a.mg]=1;if(!all[a.id])all[a.id]={id:a.id,mg:a.mg||'',pw:'N/A',cl:'N/A',rf:'N/A'};
if(a.mg&&!all[a.id].mg)all[a.id].mg=a.mg;
if(t==='power')all[a.id].pw=a.pd+'%';if(t==='clean')all[a.id].cl=a.pd+'%';if(t==='refurb')all[a.id].rf=a.pd+'%';});});
var ms=document.getElementById('cmb-mf');var cv=ms.value;ms.innerHTML='<option value="all">All Managers</option>';Object.keys(mg).sort().forEach(function(m){ms.innerHTML+='<option value="'+m+'">'+m+'</option>';});ms.value=cv||'all';
var ck=gC();var h=gH();var now=new Date();var wa=new Date(now-7*864e5);
var wp=h.filter(function(e){return new Date(e.ts)>=wa&&e.type==='power'}).length;
var wc=h.filter(function(e){return new Date(e.ts)>=wa&&e.type==='clean'}).length;
document.getElementById('cmb-g').innerHTML='<div><b>'+wp+'/20</b><small>Power Goal</small></div><div><b>'+wc+'/20</b><small>Clean Goal</small></div><div><b>'+Object.keys(all).length+'</b><small>Associates</small></div>';
var list=Object.values(all).filter(function(a){return(!sr||a.id.toLowerCase().indexOf(sr)>-1)&&(mf==='all'||a.mg.toLowerCase()===mf)});
list.sort(function(a,b){return a.id.localeCompare(b.id)});
var bd='';list.forEach(function(a){
var key=a.id;
function pcc(v){if(v==='N/A')return'class="na"';var n=parseFloat(v);return n<50?'style="color:#DC2626;font-weight:700"':n<80?'style="color:#D97706;font-weight:700"':'style="color:#16A34A;font-weight:700"';}
bd+='<tr><td class="tl">'+a.id+'</td><td style="font-size:10px">'+a.mg+'</td>';
bd+='<td '+pcc(a.cl)+'>'+a.cl+'</td><td '+pcc(a.pw)+'>'+a.pw+'</td><td '+pcc(a.rf)+'>'+a.rf+'</td>';
['sp','cl','pw','rf'].forEach(function(c){var ck2=gC();var k=key+'_'+c;var ch=ck2[k]?'checked':'';
bd+='<td><input type="checkbox" '+ch+' onchange="var c=gC();c[\''+k+'\']=this.checked;sC(c)"></td>';});
bd+='</tr>';});
document.getElementById('cmb-b').innerHTML=bd||'<tr><td colspan="9" style="text-align:center;padding:20px;color:#aaa">Drop CSVs in other tabs first</td></tr>';}

// HISTORY
function rH(){
var h=gH();var sr=(document.getElementById('h-sr').value||'').toLowerCase();
var fl=document.getElementById('h-fl').value;var so=document.getElementById('h-so').value;
var f=h.filter(function(e){return(fl==='all'||e.type===fl)&&(!sr||(e.login+' '+e.note+' '+e.date).toLowerCase().indexOf(sr)>-1)});
if(so==='newest')f.sort(function(a,b){return b.id-a.id});else f.sort(function(a,b){return a.id-b.id});
var now=new Date();var wa=new Date(now-7*864e5);
var tp=h.filter(function(e){return e.type==='power'}).length;var tc=h.filter(function(e){return e.type==='clean'}).length;
var wp=h.filter(function(e){return new Date(e.ts)>=wa&&e.type==='power'}).length;
var wc=h.filter(function(e){return new Date(e.ts)>=wa&&e.type==='clean'}).length;
document.getElementById('h-st').innerHTML='<div><b>'+h.length+'</b><small>Total</small></div><div><b>'+tp+'</b><small>Power</small></div><div><b>'+tc+'</b><small>Cleaning</small></div><div><b>'+wp+'/20</b><small>Power/Wk</small></div><div><b>'+wc+'/20</b><small>Clean/Wk</small></div>';
if(!f.length){document.getElementById('h-ls').innerHTML='<div style="text-align:center;padding:20px;color:#aaa">No history</div>';return;}
var html='';f.forEach(function(e){
var tc2=e.type==='power'?'pw':'cl';
html+='<div class="HC"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="tg '+tc2+'">'+(e.type==='power'?'Power':'Cleaning')+'</span><span style="font-size:11px;color:#888">'+e.date+'</span></div>';
html+='<div style="font-size:11px;color:#666;margin-bottom:4px"><b>'+e.login+'</b> - '+e.pct+'%</div>';
html+='<div class="nt" onclick="this.classList.toggle(\'ex\')">'+esc(e.note)+'</div>';
html+='<div style="display:flex;gap:5px;margin-top:6px"><button style="background:#F5F3FF;color:#7C3AED;border:1px solid #7C3AED;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer" onclick="navigator.clipboard.writeText(gH().find(function(x){return x.id==='+e.id+'}).note);this.textContent=\'Copied!\';var b=this;setTimeout(function(){b.textContent=\'Copy\'},1500)">Copy</button>';
html+='<button style="background:#FEF2F2;color:#DC2626;border:1px solid #DC2626;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer" onclick="if(confirm(\'Delete?\')){sH(gH().filter(function(x){return x.id!=='+e.id+'}));rH();}">Delete</button></div></div>';});
document.getElementById('h-ls').innerHTML=html;}

function expH(){var h=gH();if(!h.length)return alert('No history');var c='Type,Login,Pct,Date,Note\n';h.forEach(function(e){c+=e.type+','+e.login+','+e.pct+'%,'+e.date+',"'+e.note.replace(/"/g,'""')+'"\n';});var b=new Blob([c],{type:'text/csv'});var l=document.createElement('a');l.href=URL.createObjectURL(b);l.download='apollo_history.csv';l.click();}

rC();rH();
</script></body></html>
