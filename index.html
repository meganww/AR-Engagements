function csv(t){var l=t.split('\n');if(l.length<2)return[];var h=cln(l[0]);var r=[];for(var i=1;i<l.length;i++){var x=l[i].trim();if(!x)continue;var v=cln(x);var o={};for(var j=0;j<h.length;j++)o[h[j].trim()]=(v[j]||'').trim();r.push(o);}return r;}

h+='</tbody></table>';}

h+='</div></div>';});
